# --- Added required 'events' block ---
events {
    worker_connections 1024; # Standard default
}

# --- Added required 'http' block wrapper ---
http {

    # This block defines our Flask app
    upstream flask_app {
        # 'web' is the service name from docker-compose.yml
        # '8080' is the internal port it runs on
        server web:8080;
    }

    # --- HTTPS Server Block ---
    # This is the main server that handles secure traffic
    server {
        listen 443 ssl;

        # --- UPDATED with your IP ---
        server_name 172.31.32.71;

        # --- SSL Certificate Location ---
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        
        # --- SSL Settings ---
        ssl_protocols TLSv1.2 TLSv1.3;
        # --- (REMOVED problematic 'ssl_ciphers' line) ---

        # --- Pass all traffic to our Flask App ---
        location / {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # --- Redirect HTTP to HTTPS ---
    # This block catches any 'http' requests (port 80)
    server {
        listen 80;

        # --- UPDATED with your IP ---
        server_name 172.31.32.71;
        
        # Send all traffic to the https version
        return 301 https://$host$request_uri;
    }

}