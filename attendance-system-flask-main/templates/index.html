<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Attendance System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hero-card {
            background-color: white;
            border-radius: 0.75rem;
            padding: 4rem 2.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .btn-link-card {
            display: block;
            padding: 2rem 1.5rem;
            border-radius: 0.5rem;
            font-size: 1.25rem;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            margin-top: 1.5rem;
        }
        .btn-student {
            background-color: #eef2ff;
            color: #4338ca;
            border: 1px solid #c7d2fe;
        }
        .btn-student:hover {
            background-color: #e0e7ff;
            border-color: #a5b4fc;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .btn-teacher {
            background-color: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        .btn-teacher:hover {
            background-color: #dcfce7;
            border-color: #86efac;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 flex items-center justify-center">

    <div class="hero-card">
        <h1 class="text-3xl font-bold text-gray-900 mb-4">Welcome to the Attendance System</h1>
        <p class="text-lg text-gray-600 mb-8">Please select your role to continue.</p>

        <div>
            <!-- Links to the correct portals -->
            <a href="{{ url_for('student_portal') }}" class="btn-link-card btn-student">
                I am a Student
            </a>
            
            <a href="{{ url_for('teacher_portal') }}" class="btn-link-card btn-teacher">
                I am a Staff Member
            </a>
        </div>
    </div>

</body>
</html>
